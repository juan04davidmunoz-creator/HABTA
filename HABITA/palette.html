<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paleta de Colores - Habita</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(5, 100px);
            gap: 25px;
            margin-top: 30px;
        }

        .color {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #ddd;
        }

        .label {
            text-align: center;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>

</head>
<body>

<h1>Paleta de Colores – Habita</h1>

<div class="palette">

    <!-- Azul principal logo -->
    <div>
        <div class="color" style="background:#0A2257;"></div>
        <div class="label">#0A2257</div>
    </div>

    <!-- Azul claro -->
    <div>
        <div class="color" style="background:#1C85E8;"></div>
        <div class="label">#1C85E8</div>
    </div>

    <!-- Azul intermedio -->
    <div>
        <div class="color" style="background:#74B5FB;"></div>
        <div class="label">#74B5FB</div>
    </div>

    <!-- Verde del logo -->
    <div>
        <div class="color" style="background:#3CC15D;"></div>
        <div class="label">#3CC15D</div>
    </div>

    <!-- Amarillo check -->
    <div>
        <div class="color" style="background:#FDBB18;"></div>
        <div class="label">#FDBB18</div>
    </div>

</div>

</body>
</html>
