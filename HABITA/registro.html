<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario - Habita</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="logo small">
     <img src="logo-habita.jpg" alt="Logo Habita">
    </div>

    <h2>Registro de Usuario</h2>

    <form id="registroForm">

        <label>Nombres</label>
        <input type="text" id="nombre" placeholder="Ingrese nombres" required>

        <label>Apellidos</label>
        <input type="text" id="apellido" placeholder="Ingrese apellidos" required>

        <label>Cédula</label>
        <input type="number" id="cedula" placeholder="Ingrese cédula" required>

        <label>Fecha de nacimiento</label>
        <input type="date" id="fecha" required>

        <button type="submit" class="primary">Registrar</button>
    </form>

    <a href="login.html" class="link">Volver al login</a>
</div>

<script src="script.js"></script>
</body>
</html>
